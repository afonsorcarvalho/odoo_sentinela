services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:18.0
    depends_on:
      - db
    ports:
      - "8189:8069"
    volumes:
      - ./addons:/mnt/extra-addons
      - ./conf:/etc/odoo
      - odoo-filestore:/var/lib/odoo
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: sentinela
      POSTGRES_PASSWORD: sentinela
      POSTGRES_DB: sentinela
    ports:
      - "5433:5432"
    volumes:
      - timescale-data:/home/postgres/pgdata/data
      - ./timescale/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  sftpgo:
    image: drakkan/sftpgo:v2
    depends_on:
      - timescaledb
    ports:
      - "2022:2022"          # SFTP (LAN no dev; restringir à VPN no T3)
      - "8190:8080"          # WebAdmin do SFTPGo
    environment:
      SFTPGO_SFTPD__BINDINGS__0__PORT: 2022
      SFTPGO_COMMON__UPLOAD_MODE: 2
    volumes:
      - sftpgo-data:/srv/sftpgo
      - sftpgo-config:/var/lib/sftpgo
      - ./ingestao:/opt/ingestao:ro     # receber_upload disponível ao Event Manager
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"          # MQTT (LAN no dev; restringir à VPN em prod)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped

volumes:
  odoo-db-data:
  odoo-filestore:
  timescale-data:
  sftpgo-data:
  sftpgo-config:
  mosquitto-data:
